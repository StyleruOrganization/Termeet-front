<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Termeet — сервис для организации встреч</title>
    <meta
      name="description"
      content="Termeet — платформа для организации встреч. Создавайте встречи, находите удобное время."
    />
    <meta property="og:title" content="Termeet — удобно планируйте свои встречи" />
    <meta property="og:url" content="https://termeet-dev.ru" />
    <meta
      property="og:description"
      content="Termeet — платформа для организации встреч. Создавайте встречи, находите удобное время."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./src/assets/img/logo.png" />

    <!-- Twitter Card метатеги (опционально) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Termeet — удобно планируйте свои встречи" />
    <meta
      name="twitter:description"
      content="Termeet — платформа для организации встреч. Создавайте встречи, находите удобное время."
    />
    <meta name="twitter:image" content="./src/assets/img/logo.png" />

    <!-- Preload шрифтов -->
    <link
      rel="preload"
      href="./src/app/styles/fonts/Manrope-Medium.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="./src/app/styles/fonts/Manrope-Bold.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="./src/app/styles/fonts/Manrope-ExtraBold.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link rel="preload" href="/src/app/styles/fonts.css" as="style" crossorigin="anonymous" />

    <!-- Favicon для разных устройств и браузеров -->
    <link rel="icon" type="image/png" href="/src/assets/favicons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/favicons/favicon.svg" />
    <link rel="shortcut icon" href="/src/assets/favicons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/src/assets/favicons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Termeet" />
    <link rel="manifest" href="/src/assets/favicons/site.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/entrypoint/main.tsx"></script>
