networks:
  nginx-proxy-network:
    external: true
    name: nginx-proxy

services:
  termeet-blue: &termeet
    build:
      context: ../../
      dockerfile: infra/Dockerfile
    environment:
      - VIRTUAL_HOST=termeet.tech
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=termeet.tech
      - LETSENCRYPT_EMAIL=${EMAIL:-admin@termeet.tech}
      - BACKEND_HOST=backend.termeet.tech
      - BACKEND_CONTAINER=backend-prod
    expose:
      - 80
    command: nginx -g "daemon off;"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    profiles:
      - blue
    networks:
      - nginx-proxy-network

  termeet-green:
    <<: *termeet
    profiles:
      - green