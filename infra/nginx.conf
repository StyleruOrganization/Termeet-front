server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip off;
    brotli off;

    # Определяем доступные сжатые версии
    map $http_accept_encoding $precompressed {
        ~brotli "br";
        ~gzip   "gz";
        default "";
    }

    # Основной блок для статических файлов с поддержкой сжатия
    location / {
        # Пробуем найти файл с предварительным сжатием
        set $file_path $uri;
        
        # Проверяем существование сжатого файла
        if (-f $document_root$uri.$precompressed) {
            set $file_path $uri.$precompressed;
        }
        
        # Отдаем файл или index.html
        try_files $file_path $uri $uri/ /index.html;
        
        # Устанавливаем правильные Content-Type для сжатых файлов
        if ($file_path ~ \.br$) {
            add_header Content-Encoding br;
        }
        if ($file_path ~ \.gz$) {
            add_header Content-Encoding gzip;
        }
        
        # Кэширование
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # HTML не кэшируем
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
        
        # Vary header для корректного кэширования
        add_header Vary "Accept-Encoding";
    }

    # Проксируем запросы к API на бэкенд
    location /api/ {
        proxy_pass https://backend.termeet-dev.ru/api/;
        proxy_set_header Host backend.termeet-dev.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        
        proxy_hide_header 'Access-Control-Allow-Origin';
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}