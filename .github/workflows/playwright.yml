name: Playwright Tests
run-name: "Termeet Playwright Tests"

on:
  pull_request:
    branches: 
      - main

jobs:
  test:
    strategy:
      matrix:
        test-type: [components, e2e]
        include:
          - test-type: components
            command: pwt:test
          - test-type: e2e
            command: pwt:e2e:test
      fail-fast: true
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.number }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - uses: ./.github/actions/custom-preparing-action
          
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
        
      - name: Run tests
        id: run-tests
        continue-on-error: true
        run: |
          rm -rf playwright/.cache
          rm -rf test-results
          npx playwright clear-cache
          if [ "${{ matrix.test-type }}" = "e2e" ]; then
            pnpm run ${{ matrix.command }} -- --project=chromium
          else
            pnpm run ${{ matrix.command }}
          fi

      # Обновляем скриншоты если тесты упали
      - name: Update screenshots
        id: update-screens
        if: steps.run-tests.outcome == 'failure'
        run: |
          if [ "${{ matrix.test-type }}" = "e2e" ]; then
            pnpm run ${{ matrix.command }} -- --project=chromium --update-snapshots
          else
            pnpm run ${{ matrix.command }} --update-snapshots
          fi
          echo "SCREENSHOTS_UPDATED=true" >> $GITHUB_OUTPUT

      # Коммитим обновленные скриншоты
      - name: Commit updated screenshots
        if: steps.update-screens.outputs.SCREENSHOTS_UPDATED == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Добавляем только измененные скриншоты
          git add -A
          
          # Проверяем есть ли изменения
          if git diff --staged --quiet; then
            echo "No screenshots to update"
          else
            git commit -m "chore: update playwright screenshots [skip ci]"
            git push
          fi

      # Комментарий при обновлении скриншотов
      - name: Comment PR on screenshot update
        if: steps.update-screens.outputs.SCREENSHOTS_UPDATED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const testType = '${{ matrix.test-type }}';
            const body = `## 🖼️ Обновлены скриншоты Playwright!

            **Автоматически обновил скриншоты для \`${testType}\` тестов.**

            **Что дальше:**
            - ✅ Проверь, что скриншоты выглядят корректно
            
            > ⚠️ Если изменения неожиданные, проверь код!`;
            
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # Уведомление об успехе
      - name: Comment PR on success
        if: steps.run-tests.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const testType = '${{ matrix.test-type }}';
            const body = `## ✅ ${testType} тесты прошли успешно!`;
            
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });