name: Deploy production
run-name: "Deploy Production - v${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.2.3)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must follow semver format (e.g., 1.2.3)"
            exit 1
          fi

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: VERSION,EMAIL,DOMAIN
          script: |
            cd /home/${{ secrets.SERVER_USER }}/infra/deploy-prod
            
            # Передаем версию в скрипт
            export VERSION="${{ inputs.version }}"
            export EMAIL="${{ secrets.EMAIL }}"
            export DOMAIN="termeet.tech"
            
            # Запускаем деплой
            chmod +x prod-deploy.sh
            ./prod-deploy.sh

      - name: Generate CHANGELOG and create tag
        if: success()
        run: |
          # Получаем последний тег
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          # Создаем или обновляем CHANGELOG.md
          if [ ! -f CHANGELOG.md ]; then
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "All notable changes to this project will be documented in this file." >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi
          
          # Получаем коммиты с предыдущего тега
          if [ -n "${LAST_TAG}" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --reverse)
          else
            COMMITS=$(git log --pretty=format:"- %s" --reverse)
          fi
          
          RELEASE_DATE=$(date '+%Y-%m-%d')
          
          # Создаем временный файл с новым CHANGELOG
          TMP_FILE=$(mktemp)
          
          # Записываем заголовок
          echo "# Changelog" > "${TMP_FILE}"
          echo "" >> "${TMP_FILE}"
          echo "All notable changes to this project will be documented in this file." >> "${TMP_FILE}"
          echo "" >> "${TMP_FILE}"
          
          # Добавляем новую запись о релизе
          echo "## [${{ inputs.version }}] - ${RELEASE_DATE}" >> "${TMP_FILE}"
          echo "" >> "${TMP_FILE}"
          
          if [ -n "${COMMITS}" ]; then
            echo "### Changes" >> "${TMP_FILE}"
            echo "${COMMITS}" >> "${TMP_FILE}"
            echo "" >> "${TMP_FILE}"
          else
            echo "### Changes" >> "${TMP_FILE}"
            echo "- Production deployment" >> "${TMP_FILE}"
            echo "" >> "${TMP_FILE}"
          fi
          
          # Добавляем остальной CHANGELOG (без первой строки заголовка)
          tail -n +2 CHANGELOG.md >> "${TMP_FILE}"
          
          # Заменяем старый CHANGELOG новым
          mv "${TMP_FILE}" CHANGELOG.md
          
          # Коммитим CHANGELOG
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG for v${{ inputs.version }}"
          
          # Создаем тег
          git tag -a "v${{ inputs.version }}" -m "Release version ${{ inputs.version }}"
          git push origin main --tags